<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 200 200" height="200" width="200">
  
  <defs>
    <linearGradient gradientUnits="userSpaceOnUse" y2="160" x2="160" y1="40" x1="40" id="lightBg">
      <stop stop-color="#F0F9FF" offset="0%"></stop>
      <stop stop-color="#E0F2FE" offset="100%"></stop>
    </linearGradient>
    <linearGradient gradientUnits="userSpaceOnUse" y2="130" x2="95" y1="80" x1="60" id="HGradient">
      <stop stop-color="#3B82F6" offset="0%"></stop>
      <stop stop-color="#1E40AF" offset="100%"></stop>
    </linearGradient>
    <linearGradient gradientUnits="userSpaceOnUse" y2="135" x2="145" y1="80" x1="105" id="SGradient">
