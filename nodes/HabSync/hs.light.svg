  <circle stroke-width="12" stroke="#E0F2FE" fill="url(#lightBg)" r="95" cy="100" cx="100"></circle>

  
  <text letter-spacing="-6px" text-anchor="middle" fill="url(#HGradient)" font-weight="900" font-size="92" font-family="Arial Black, sans-serif" y="118" x="78">H</text>

  
  <text letter-spacing="-6px" text-anchor="middle" fill="url(#SGradient)" font-weight="900" font-size="92" font-family="Arial Black, sans-serif" y="118" x="132">S</text>

  
